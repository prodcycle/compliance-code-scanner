name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run type-check

      - run: pnpm run test

      - run: pnpm run build

      - name: Check dist/ is up to date
        run: |
          if [ -n "$(git diff --name-only dist/)" ]; then
            echo "::error::dist/ is out of date. Run 'pnpm run build' and commit the changes."
            git diff --stat dist/
            exit 1
          fi

  # Self-test: run the action on its own PRs to verify it works end-to-end
  compliance-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Compliance Scanner
        uses: ./
        with:
          api-key: ${{ secrets.PRODCYCLE_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on: critical
